name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: pip install -r router/requirements.txt || true  # May not exist yet
      - name: Run unit tests
        run: |
          pytest tests/unit -v --cov=router --cov=capabilities --cov-report=term-missing --cov-fail-under=80 -m unit

  test-integration:
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: pip install -r router/requirements.txt || true
      - name: Run integration tests
        run: |
          pytest tests/integration -v -m integration || [ $? -eq 5 ]

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build router image
        run: docker build -f router/Dockerfile -t test-router .
