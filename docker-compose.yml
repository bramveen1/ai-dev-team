services:
  router:
    build:
      context: .
      dockerfile: router/Dockerfile
    environment:
      - SLACK_BOT_TOKEN=${LISA_BOT_TOKEN}
      - SLACK_APP_TOKEN=${LISA_APP_TOKEN}
      - SLACK_SIGNING_SECRET=${LISA_SIGNING_SECRET}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-600}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./memory:/memory
      - ./agents/lisa:/agent
      - ./systems:/systems
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      - lisa
    restart: unless-stopped

  lisa:
    build:
      context: ./agents/lisa
      dockerfile: Dockerfile
    container_name: lisa
    volumes:
      - ./memory:/memory
      - ./agents/lisa:/agent
      - ./systems:/systems
      - lisa-claude-config:/home/claude/.claude
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

volumes:
  lisa-claude-config:
